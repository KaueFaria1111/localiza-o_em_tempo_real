<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapa em Tempo Real</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div id="map"></div>

    <div class="panel">
        <div class="tabs">
            <button id="tabRegister" type="button" class="active">Cadastro</button>
            <button id="tabLogin" type="button">Login</button>
        </div>

        <div id="message"></div>

        <form id="registerForm" enctype="multipart/form-data">
            <h2>Cadastrar</h2>
            <input type="text" name="name" placeholder="Nome" required />
            <input type="email" name="email" placeholder="E-mail" required />
            <input type="password" name="password" placeholder="Senha" required />
            <input type="file" name="photo" accept="image/*" />
            <button type="submit">Cadastrar</button>
        </form>

        <form id="loginForm" class="hidden">
            <h2>Entrar</h2>
            <input type="email" name="email" placeholder="E-mail" required />
            <input type="password" name="password" placeholder="Senha" required />
            <button type="submit">Entrar</button>
        </form>

        <div id="loggedArea" class="hidden">
            <h2>Usuário logado</h2>
            <div id="loggedUserCard"></div>
            <button id="startTrackingBtn" type="button">Ativar localização em tempo real</button>
            <button id="logoutBtn" type="button" class="logout">Sair</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>

</html>
